version: 2

models:
  - name: mart_orders
    description: >
      Order-level analytical table. One row per order.
      Answers: How many orders were placed? What is the revenue trend?
      Which regions/segments drive the most volume? How are fulfillment
      and return rates trending?
    columns:
      - name: order_id
        description: "Primary key. Unique identifier for each order."
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to mart_customers."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('mart_customers')
                field: customer_id
      - name: order_status
        description: "O=Open, F=Fulfilled, P=Processing."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']
      - name: order_total_price
        description: "Total order value in USD."
        data_tests:
          - not_null
      - name: order_date
        description: "Date the order was placed."
        data_tests:
          - not_null
      - name: return_rate
        description: "Ratio of returned line items to total line items. 0=no returns, 1=all returned."
      - name: days_to_first_shipment
        description: "Days between order placement and first shipment. Lower is better."
