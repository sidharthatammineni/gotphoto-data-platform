version: 2

models:
  - name: mart_customers_rfm
    description: >
      RFM (Recency, Frequency, Monetary) scoring model for all customers.
      Built using Snowpark Python. One row per customer.
      Answers: Who are our most valuable customers? Who is at risk of churning?
      Which customers should marketing prioritize?
      Grain: one row per customer_id.
      Target users: Marketing, CRM teams, AI agents for customer targeting and workflow automation.
    columns:
      - name: customer_id
        description: "Primary key. Unique identifier per customer."
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('mart_customers')
                field: customer_id

      - name: customer_name
        description: "Customer full name."
        data_tests:
          - not_null

      - name: market_segment
        description: "Customer market segment."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']

      - name: customer_tier
        description: "Platinum/Gold/Silver/Bronze based on lifetime revenue."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Platinum', 'Gold', 'Silver', 'Bronze']

      - name: total_orders
        description: "Total number of orders placed by this customer."
        data_tests:
          - not_null

      - name: lifetime_revenue
        description: "Total revenue generated by this customer."
        data_tests:
          - not_null

      - name: last_order_date
        description: "Date of the most recent order."
        data_tests:
          - not_null

      - name: days_since_last_order
        description: "Number of days since the customer last ordered. Lower = more recent."
        data_tests:
          - not_null

      - name: recency_score
        description: "Recency quintile score 1-5. 5 = ordered most recently."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 5

      - name: frequency_score
        description: "Frequency quintile score 1-5. 5 = orders most frequently."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 5

      - name: monetary_score
        description: "Monetary quintile score 1-5. 5 = highest lifetime revenue."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 5

      - name: rfm_score
        description: "Combined RFM score (sum of R+F+M). Range 3-15. Higher = more valuable customer."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 3
                max_value: 15

      - name: rfm_segment
        description: >
          Customer segment based on RFM score:
          Champions (>=13), Loyal Customers (>=10),
          Potential Loyalists (>=7), At Risk (>=5), Lost (<5).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Champions', 'Loyal Customers', 'Potential Loyalists', 'At Risk', 'Lost']
