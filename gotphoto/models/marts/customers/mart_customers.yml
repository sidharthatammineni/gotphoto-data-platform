version: 2

models:
  - name: mart_customers
    description: >
      Customer-level analytical table. One row per customer.
      Answers: Who are our highest-value customers? What is the LTV by
      segment and region? Which customers have high return or late delivery
      rates? How is the customer base distributed across tiers?
    columns:
      - name: customer_id
        description: "Primary key. Unique identifier per customer."
        data_tests:
          - unique
          - not_null
      - name: customer_tier
        description: "Platinum (>=1M), Gold (>=500K), Silver (>=100K), Bronze (<100K) based on lifetime revenue."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Platinum', 'Gold', 'Silver', 'Bronze']
      - name: lifetime_revenue
        description: "Total revenue generated by this customer across all orders."
        data_tests:
          - not_null
      - name: total_orders
        description: "Total number of orders placed by this customer."
        data_tests:
          - not_null
