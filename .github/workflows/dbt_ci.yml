name: dbt CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      DBT_SNOWFLAKE_ACCOUNT: ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER: ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD: ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE: ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_DATABASE: ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          gotphoto:
            outputs:
              dev:
                type: snowflake
                account: ${DBT_SNOWFLAKE_ACCOUNT}
                user: ${DBT_SNOWFLAKE_USER}
                password: ${DBT_SNOWFLAKE_PASSWORD}
                role: ${DBT_SNOWFLAKE_ROLE}
                database: ${DBT_SNOWFLAKE_DATABASE}
                schema: dbt_ci_${{ github.run_id }}
                warehouse: ${DBT_SNOWFLAKE_WAREHOUSE}
                threads: 4
            target: dev
          EOF

      - name: Install dbt packages
        working-directory: gotphoto
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: gotphoto
        run: dbt compile

      - name: dbt run (staging only for CI speed)
        working-directory: gotphoto
        run: dbt run --select staging

      - name: dbt test (staging)
        working-directory: gotphoto
        run: dbt test --select staging

      - name: dbt run (marts)
        working-directory: gotphoto
        run: dbt run --select marts

      - name: dbt test (marts)
        working-directory: gotphoto
        run: dbt test --select marts

      - name: Cleanup CI schema
        if: always()
        working-directory: gotphoto
        run: |
          dbt run-operation drop_schema \
            --args "{schema: dbt_ci_${{ github.run_id }}, database: ${DBT_SNOWFLAKE_DATABASE}}" \
            || true
